<tr>
  <td class="r date">
    <time datetime="{{ post.date | date: '%Y-%m-%d' }}">{{ post.date | date: '%B' }} {{ post.date | date: '%d' | ordinalize }}</time>
  </td>
  {% if include.album %}
    <td class="kind">{{ post.album.kind }}</td>
  {% else %}
    <td class="format">{{ post.media.format }}</td>
  {% endif %}
  <td><a href="{{ post.url }}">{{ post.title }}</a></td>
</tr>
